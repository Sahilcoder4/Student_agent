version: '3.8'

services:
  student-agent:
    build: .
    container_name: student-enrollment-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Service for running tests
  student-agent-test:
    build: .
    container_name: student-agent-test
    command: python test_agent.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    profiles:
      - test
